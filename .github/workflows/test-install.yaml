name: Test Install

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Check R syntax
        run: |
          Rscript -e "parse('install.R')"
          Rscript -e "parse('check_install.R')"
          Rscript -e "parse('scripts/diagnose.R')"
          Rscript -e "parse('scripts/show_sysreqs.R')"

      - name: Check bash syntax
        run: |
          bash -n scripts/install_system_ubuntu.sh
          bash -n scripts/install_all.sh

      - name: Run installer smoke test
        run: GIOVANNELLI_BOOTSTRAP_CI=true Rscript install.R
